# Continuous Integration — runs on every push and pull request.
# Goal of this minimal version: prove the images build clean in a fresh
# environment. Catches "works on my machine but not on a CI VM" bugs.

name: CI

# When does this workflow run?
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Two jobs run in parallel (each gets its own fresh Ubuntu VM).
jobs:

  # ── Backend image build ─────────────────────────────────────────────────────
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    steps:
      # `actions/checkout` is a pre-built action that clones the repo into
      # the VM. The `@v4` pins a specific version (don't auto-upgrade).
      - name: Checkout repo
        uses: actions/checkout@v4

      # Sets up Docker's modern build engine (Buildx). Comes with niceties
      # like caching and multi-platform support.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The actual build. Same as your local `docker build`, just in CI.
      - name: Build backend Dockerfile
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false                    # not pushing yet — that's step 3
          tags: crashlens-backend:ci
          # GitHub Actions cache layer reuse — speeds up subsequent runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Frontend image build ────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Dockerfile
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: crashlens-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
