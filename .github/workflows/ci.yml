# Continuous Integration + Publish.
# On every push/PR → checks must pass.
# On push to main → built images are pushed to GHCR.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for the GHCR push step to authenticate via GITHUB_TOKEN.
permissions:
  contents: read
  packages: write

# Compute image names once. github.repository_owner is lowercase already.
env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/crashlens-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/crashlens-frontend

jobs:

  # ── Frontend: lint (informational) ──────────────────────────────────────────
  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Run ESLint (non-blocking)
        # The existing codebase has pre-existing lint warnings. We want to
        # see them in CI but not block every push. Remove `continue-on-error`
        # once the codebase is clean.
        continue-on-error: true
        run: npm run lint
        working-directory: frontend

  # ── Backend: smoke test against a real Postgres ─────────────────────────────
  # GitHub Actions can run "service containers" alongside the job — we use it
  # to spin up a temporary Postgres, run alembic, then ping /health. This
  # catches migration breaks + import errors before they hit a real env.
  smoke-backend:
    name: Backend smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crashlens
        ports:
          - 5432:5432
        # GH Actions waits for this to pass before starting the steps below.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crashlens
      JWT_SECRET: ci-test-secret-not-real
      CORS_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - name: Run migrations
        run: alembic upgrade head
        working-directory: backend
      - name: Boot uvicorn + hit /health
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          # wait up to 30s for the server to be reachable
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health > /dev/null 2>&1; then
              echo "✓ /health responding"
              curl -s http://localhost:8000/health
              exit 0
            fi
            sleep 1
          done
          echo "✗ /health never came up"
          exit 1
        working-directory: backend

  # ── Build (and push on main) — backend ──────────────────────────────────────
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: smoke-backend                # only build if smoke passed
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      # Login is only needed when we're going to push (i.e. on main).
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          # Push only on push-to-main. PRs build but don't publish.
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build (and push on main) — frontend ─────────────────────────────────────
  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: lint-frontend                # not blocking on lint, but ordered after it
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
