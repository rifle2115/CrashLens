# ═══════════════════════════════════════════════════════════════════════════════
# Render Blueprint — deploys CrashLens (backend + frontend + Postgres) from git.
# ═══════════════════════════════════════════════════════════════════════════════
# How it's used:
#   1. Push this file to GitHub.
#   2. On Render: New + → Blueprint → pick the CrashLens repo.
#   3. Render reads this file and creates all three resources.
#   4. You fill in the two `sync: false` secrets when prompted.
#
# Every later `git push` to main auto-rebuilds and redeploys. No SSH, no compose.
#
# NOTE ON URLS: Render names each service https://<name>.onrender.com. The two
# hardcoded URLs below assume the names "crashlens-backend" / "crashlens-frontend"
# are available. If Render appends a random suffix (because the name is taken),
# update CORS_ORIGINS and NEXT_PUBLIC_API_URL to the real URLs and redeploy.
# ═══════════════════════════════════════════════════════════════════════════════

# Database lives on Neon (https://neon.tech) — free tier, never expires, just
# auto-suspends when idle. Create a project there, copy the connection string,
# and paste it into the backend's DATABASE_URL when Render prompts (sync: false).

services:
  # ── Backend: FastAPI ────────────────────────────────────────────────────────
  - type: web
    name: crashlens-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: virginia
    healthCheckPath: /health
    # start.sh runs `alembic upgrade head` then execs uvicorn on $PORT.
    # Using a script (not an inline `sh -c "a && b"`) avoids Render's quote/env
    # mangling of chained commands. Replaces the compose `migrate` service.
    dockerCommand: sh start.sh
    envVars:
      - key: DATABASE_URL
        sync: false                    # paste your Neon connection string here
      - key: JWT_SECRET
        generateValue: true            # Render generates a strong random value
      - key: GROQ_API_KEY
        sync: false                    # you paste this in the dashboard
      - key: CORS_ORIGINS
        value: https://crashlens-frontend.onrender.com

  # ── Frontend: Next.js (standalone) ──────────────────────────────────────────
  - type: web
    name: crashlens-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    region: virginia
    envVars:
      # NEXT_PUBLIC_* is baked in at BUILD time. Render passes service env vars
      # as Docker build args, so the frontend Dockerfile's `ARG NEXT_PUBLIC_API_URL`
      # picks this up. Must point at the backend's public URL.
      - key: NEXT_PUBLIC_API_URL
        value: https://crashlens-backend.onrender.com
