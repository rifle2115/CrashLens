# Production compose - runs on the EC2 instance.
# Logs ship to CloudWatch via the awslogs driver (EC2 IAM role has perms).

x-awslogs: &awslogs
  driver: awslogs
  options:
    awslogs-region: us-east-1
    awslogs-group: /crashlens/${LOG_GROUP_NAME:-default}

services:

  # One-shot migration runner. Backend waits for it to exit 0.
  migrate:
    build: ./backend
    container_name: crashlens-migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: "no"
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /crashlens/migrate
        awslogs-stream: migrate

  backend:
    build: ./backend
    container_name: crashlens-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      migrate:
        condition: service_completed_successfully
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /crashlens/backend
        awslogs-stream: backend

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: crashlens-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /crashlens/frontend
        awslogs-stream: frontend
